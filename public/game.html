<!doctype html>
<html>
  <head>
    <title>Guess The Song</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .game-container {
        width: 100%;
        max-width: 500px;
        padding: 25px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        text-align: center;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 28px;
        letter-spacing: 1px;
      }

      #roundDisplay {
        position: absolute;
        top: 15px;
        left: 20px;
        font-weight: bold;
        opacity: 0.8;
      }

      #status {
        margin: 15px 0;
        font-size: 16px;
        color: #94a3b8;
      }

      input {
        width: 70%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
        background: #0f172a;
        color: white;
        margin-top: 10px;
      }

      .btn {
        padding: 12px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      .btn-primary {
        background: #3b82f6;
        color: white;
      }

      .btn-primary:hover {
        background: #2563eb;
        transform: scale(1.05);
      }

      .btn-audio {
        background: #22c55e;
        margin-bottom: 10px;
      }

      .btn-audio:hover {
        background: #16a34a;
      }

      .scoreboard {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.4);
      }

      .player-list {
        position: absolute;
        left: 10px;
        top: 80px;
        width: 200px;
        background: #1f2937;
        padding: 10px;
        border-radius: 10px;
      }

      .player {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        background: #374151;
        font-size: 14px;
      }

      .player.guessed {
        background: #22c55e;
      }

      .chat-box {
        position: absolute;
        right: 10px;
        top: 80px;
        width: 250px;
        height: 300px;
        background: #1f2937;
        border-radius: 10px;
        padding: 10px;
        overflow-y: auto;
      }

      .chat-msg {
        margin-bottom: 5px;
        font-size: 14px;
      }

      .chat-system {
        color: #22c55e;
        font-weight: bold;
      }

      #topBar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 20px;
        margin-bottom: 10px;
      }
      
      #timer {
        font-weight: bold;
        font-size: 22px;
      }
      
      #timerContainer {
        width: 100%;
        height: 8px;
        background: #ddd;
        border-radius: 5px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      
      #timerBar {
        height: 100%;
        width: 100%;
        background: #4caf50;
        transition: width 1s linear;
      }

      .leaderboard-popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 999;
      }

      .leaderboard-box {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        width: 300px;
      }

      .player.guessed {
        background: #22c55e; /* green */
      }

      .scoreboard h3 {
        margin-bottom: 10px;
        font-size: 16px;
        color: #cbd5f5;
      }

      #scoreDisplay {
        font-size: 14px;
        color: #e2e8f0;
      }

      .guess-row {
        margin-top: 15px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }
    </style>
  </head>

  <body>
    <!-- ROUND -->
  <div id="topBar">
    <div id="roundDisplay">Round 1</div>
    <div id="timer">30</div>
    <div id="timerContainer">
        <div id="timerBar"></div>
    </div>
  </div>

    <div id="playerList" class="player-list"></div>

    <div id="chatBox" class="chat-box"></div>

    <div class="game-container">
      <h1>Guess The Song</h1>

      <!-- AUDIO -->

      <!-- STATUS -->
      <p id="status">Waiting for next round...</p>

      <div id="roundResult" style="display: none; margin-top: 20px">
        <h2 id="resultTitle"></h2>
        <p id="resultArtist"></p>
        <img
          id="resultImage"
          src=""
          style="width: 200px; border-radius: 10px; margin-top: 10px"
        />
      </div>

      <!-- INPUT -->
      <div class="guess-row">
        <input id="guessInput" placeholder="Type your guess..." />
        <button id="guessBtn" class="btn btn-primary">Guess</button>
      </div>

      <div id="leaderboardPopup" class="leaderboard-popup">
        <div class="leaderboard-box" id="leaderboardContent"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
