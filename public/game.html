<!doctype html>
<html>
  <head>
    <title>Guess The Song</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* TOP BAR */
      .top-bar {
        position: absolute;
        top: 10px;
        width: 90%;
        max-width: 900px;
      }

      .top-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 5px;
      }

      #roundDisplay {
        font-weight: bold;
        opacity: 0.8;
      }

      #timer {
        font-weight: bold;
        font-size: 22px;
      }

      #timerContainer {
        width: 100%;
        height: 8px;
        background: #1f2937;
        border-radius: 5px;
        overflow: hidden;
      }

      #timerBar {
        height: 100%;
        width: 100%;
        background: #22c55e;
        transition: width 1s linear;
      }

      /* MAIN BOX */
      .game-container {
        width: 100%;
        max-width: 500px;
        padding: 25px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        text-align: center;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 28px;
      }

      #status {
        margin: 15px 0;
        font-size: 16px;
        color: #94a3b8;
      }

      input {
        width: 70%;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 14px;
        background: #0f172a;
        color: white;
      }

      .btn {
        padding: 12px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }

      .btn-primary {
        background: #3b82f6;
        color: white;
      }

      .btn-primary:hover {
        background: #2563eb;
        transform: scale(1.05);
      }

      .guess-row {
        margin-top: 15px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      /* PLAYER LIST */
      .player-list {
        position: absolute;
        left: 10px;
        top: 100px;
        width: 200px;
        background: #1f2937;
        padding: 10px;
        border-radius: 10px;
      }

      .player {
        display: flex;
        justify-content: space-between;
        padding: 8px;
        margin: 5px 0;
        border-radius: 6px;
        background: #374151;
        font-size: 14px;
      }

      .player.guessed {
        background: #22c55e;
      }

      /* CHAT */
      .chat-box {
        position: absolute;
        right: 10px;
        top: 100px;
        width: 250px;
        height: 300px;
        background: #1f2937;
        border-radius: 10px;
        padding: 10px;
        overflow-y: auto;
      }

      .chat-msg {
        margin-bottom: 5px;
        font-size: 14px;
      }

      .chat-system {
        color: #22c55e;
        font-weight: bold;
      }

      /* LEADERBOARD */
      .leaderboard-popup {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        display: none;
        justify-content: center;
        align-items: center;
      }

      .leaderboard-box {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        width: 300px;
      }
    </style>
  </head>

  <body>
    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="top-row">
        <div id="roundDisplay">Round 1</div>
        <div id="timer">30</div>
      </div>
      <div id="timerContainer">
        <div id="timerBar"></div>
      </div>
    </div>

    <!-- SIDE PANELS -->
    <div id="playerList" class="player-list"></div>
    <div id="chatBox" class="chat-box"></div>

    <!-- MAIN -->
    <div class="game-container">
      <h1>Guess The Song</h1>

      <p id="status">Waiting for next round...</p>

      <div class="guess-row">
        <input id="guessInput" placeholder="Type your guess..." />
        <button id="guessBtn" class="btn btn-primary">Guess</button>
      </div>

      <!-- LEADERBOARD -->
      <div id="leaderboardPopup" class="leaderboard-popup">
        <div class="leaderboard-box" id="leaderboardContent"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
